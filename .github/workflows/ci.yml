name: Synaptix CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "*.md"
      - "docs/**"
      - "ADD_NEW_DEVICES.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "*.md"
      - "docs/**"
      - "ADD_NEW_DEVICES.md"
  workflow_dispatch:

# Required for softprops/action-gh-release and mathieudutour/github-tag-action
# to create tags and releases.
permissions:
  contents: write
  security-events: write

# Opt into Node.js 24 for all GitHub Actions runners in this workflow,
# silencing the Node.js 20 deprecation warning on checkout, upload-artifact, etc.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── CI: lint, test, build, and store the .deb artifact ────────────────────
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Security scan: Rust dependencies ─────────────────────────────────────
      - name: Trivy scan — Rust (Cargo.lock)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: Cargo.lock
          scanners: vuln
          format: sarif
          output: trivy-cargo.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload Trivy SARIF — Rust
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-cargo.sarif
          category: trivy-cargo

      # ── Security scan: Node.js dependencies ──────────────────────────────────
      - name: Trivy scan — Node.js (synaptix-ui)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: crates/synaptix-ui
          scanners: vuln
          format: sarif
          output: trivy-npm.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload Trivy SARIF — Node.js
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-npm.sarif
          category: trivy-npm


      # ── System dependencies (Tauri + D-Bus + USB) ────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libdbus-1-dev \
            libudev-dev \
            libgtk-3-dev \
            webkit2gtk-driver \
            xvfb

      # ── Node.js ──────────────────────────────────────────────────────────────
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crates/synaptix-ui/package-lock.json

      # ── Rust toolchain ───────────────────────────────────────────────────────
      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # ── Cargo cache ──────────────────────────────────────────────────────────
      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      # ── Frontend dependencies ────────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: crates/synaptix-ui
        run: npm ci

      # ── Format check ─────────────────────────────────────────────────────────
      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      # ── Clippy lint ──────────────────────────────────────────────────────────
      - name: Lint with Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      # ── Rust tests (protocol + daemon TDD suite) ─────────────────────────────
      - name: Run Rust tests
        run: cargo test --workspace

      # ── Frontend tests (Vitest + Testing Library) ────────────────────────────
      - name: Run frontend tests
        working-directory: crates/synaptix-ui
        run: npm test

      # ── Cache tauri-driver binary ────────────────────────────────────────────
      - name: Cache tauri-driver binary
        uses: actions/cache@v4
        id: cache-tauri-driver
        with:
          path: ~/.cargo/bin/tauri-driver
          key: tauri-driver-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      # ── Install tauri-driver (skip if cached) ────────────────────────────────
      - name: Install tauri-driver
        if: steps.cache-tauri-driver.outputs.cache-hit != 'true'
        run: cargo install tauri-driver --locked

      # ── Daemon release binary (required by the .deb bundler) ─────────────────
      - name: Build daemon (release)
        run: cargo build --release -p synaptix-daemon

      # ── Tauri .deb bundle ────────────────────────────────────────────────────
      # src-tauri is a workspace member, so cargo output lands in the workspace
      # root target/. The bundle is therefore at target/release/bundle/deb/.
      - name: Build UI and package .deb
        working-directory: crates/synaptix-ui
        run: npm run tauri build

      # ── E2E tests (WebDriver / tauri-driver) ────────────────────────────────
      # Runs after tauri build so the binary exists at target/release/synaptix-ui.
      # xvfb-run provides a headless display; daemon-dependent tests auto-skip
      # (no Razer hardware in CI).
      - name: Run E2E tests
        working-directory: crates/synaptix-ui
        run: xvfb-run --auto-servernum npm run test:e2e

      # ── Store .deb for the release job (and as a downloadable artifact) ──────
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: synaptix-deb
          path: target/release/bundle/deb/*.deb
          if-no-files-found: error

  # ── Release: auto-tag and publish on every merge to main ──────────────────
  #
  # Triggered automatically on every push to main (i.e. every merged PR).
  # mathieudutour/github-tag-action reads conventional commit prefixes to
  # decide the semver bump:
  #   feat:            → minor  (0.3.0 → 0.4.0)
  #   fix: / chore:    → patch  (0.3.0 → 0.3.1)
  #   BREAKING CHANGE  → major  (0.3.0 → 1.0.0)
  # No manual tagging required.
  release:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      # Full history is required so github-tag-action can walk commits
      # back to the previous tag to compute the changelog.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Auto-bump version and create the tag ─────────────────────────────────
      - name: Bump version tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v

      # ── Download the .deb built by the CI job — no need to rebuild ───────────
      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: synaptix-deb
          path: dist/

      # ── Publish to GitHub Releases ───────────────────────────────────────────
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: "Synaptix ${{ steps.tag.outputs.new_tag }}"
          body: ${{ steps.tag.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.new_tag, '-') }}
          files: dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

