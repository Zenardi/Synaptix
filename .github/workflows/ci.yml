name: Synaptix CI

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "README.md"
      - "*.md"
      - "docs/**"
      - "ADD_NEW_DEVICES.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "*.md"
      - "docs/**"
      - "ADD_NEW_DEVICES.md"
  workflow_dispatch:

# Required for softprops/action-gh-release to create/update releases.
permissions:
  contents: write

# Opt into Node.js 24 for all GitHub Actions runners in this workflow,
# silencing the Node.js 20 deprecation warning on checkout, upload-artifact, etc.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── CI: lint, test, build, and store the .deb artifact ────────────────────
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── System dependencies (Tauri + D-Bus + USB) ────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libdbus-1-dev \
            libudev-dev \
            libgtk-3-dev

      # ── Node.js ──────────────────────────────────────────────────────────────
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crates/synaptix-ui/package-lock.json

      # ── Rust toolchain ───────────────────────────────────────────────────────
      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # ── Cargo cache ──────────────────────────────────────────────────────────
      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      # ── Frontend dependencies ────────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: crates/synaptix-ui
        run: npm ci

      # ── Format check ─────────────────────────────────────────────────────────
      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      # ── Clippy lint ──────────────────────────────────────────────────────────
      - name: Lint with Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      # ── Rust tests (protocol + daemon TDD suite) ─────────────────────────────
      - name: Run Rust tests
        run: cargo test --workspace

      # ── Frontend tests (Vitest + Testing Library) ────────────────────────────
      - name: Run frontend tests
        working-directory: crates/synaptix-ui
        run: npm test

      # ── Daemon release binary (required by the .deb bundler) ─────────────────
      - name: Build daemon (release)
        run: cargo build --release -p synaptix-daemon

      # ── Tauri .deb bundle ────────────────────────────────────────────────────
      # src-tauri is a workspace member, so cargo output lands in the workspace
      # root target/. The bundle is therefore at target/release/bundle/deb/.
      - name: Build UI and package .deb
        working-directory: crates/synaptix-ui
        run: npm run tauri build

      # ── Store .deb for the release job (and as a downloadable artifact) ──────
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: synaptix-deb
          path: target/release/bundle/deb/*.deb
          if-no-files-found: error

  # ── Release: publish to GitHub Releases on version tags ───────────────────
  release:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      # Download the .deb built by the CI job — no need to rebuild.
      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: synaptix-deb
          path: dist/

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          name: "Synaptix ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/*.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
